<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model</title>
    
    <style>
        div.main {
          border-style: solid;
          border-width: 3px;
          border-color: black;
          height: 150px;
          width: 450px;
          }
         
        span.box1 {
          display: inline-block;
          width: 100px;
          height: 100px;
          border-style: solid;
          border-width: 2px;
          border-color: black;
          margin-left: 32.5px;
          margin-top: 23px;
          margin-bottom: 23px;
          background-color: rgb(255, 182, 193);
          text-align: center;
          box-sizing: border-box;
          padding-top: 40px;
          }
         
        span.box2 {
          display: inline-block;
          width: 100px;
          height: 100px;
          border-style: solid;
          border-width: 2px;
          border-color: black;
          margin-left: 32.5px;
          margin-top: 23px;
          margin-bottom: 23px;
          background-color: rgb(255, 250, 205);
          text-align: center;
          box-sizing: border-box;
          padding-top: 40px;
          }
          
        span.box3 {
          display: inline-block;
          width: 100px;
          height: 100px;
          border-style: solid;
          border-width: 2px;
          border-color: black;
          margin-left: 32.5px;
          margin-top: 23px;
          margin-bottom: 23px;
          background-color: rgb(204, 255, 204);
          text-align: center;
          box-sizing: border-box;
          padding-top: 40px;
          }
          
    </style>
    
</head>
<body>
    <h1>CSS Box Model</h1>
    
    <div class="main">
        
        <span class="box1">
            Box 1
        </span>
        
        <span class="box2">
            Box 2
        </span>
        
        <span class="box3">
            Box 3
        </span>
        
    </div>
</body>
</html>
