<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Friends Suggestion in Fb</title>
    <style>
    h1 {
     color: rgb(255, 0, 102);
     font-size: 30px;
     margin-left: 130px;
     }
    div {
     display: inline-block;
     height: 220px;
     width: 130px;
     border-style: none;
     border-width: 1px;
     border-color: black;
     margin-right: 5px;
     margin-bottom: 10px;
     box-shadow: 0px 0px 3px black;
     }
    img {
     width: 130px;
     height: 140px;
     object-fit: cover;
     }
     p {
     font-weight: bold;
     color: black;
     margin-left: 5px;
     margin-top: 5px;
     margin-bottom: 0px;
     }
     .sub-text {
     font-weight: normal;
     font-size: 11px;
     }
     button {
     margin-top: 5px;
     margin-left: 5px;
     border-style: none;
     background-color: rgb(0, 132, 255);
     color: white;
     height: 22px;
     width: 70px;
     font-size: 10px;
     font-weight: bold;
     border-radius: 3px;
     }
    </style>
</head>
<body>
    <h1>Cat-Gram 💕</h1>
    <div>
        <img src="https://plus.unsplash.com/premium_photo-1707353402057-c95bdddb5b39?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></img>
        <p>Smita</p>
        <p class="sub-text">2 mutual friends</p>
        <button>
            Add Friend
        </button>
    </div>
    
    <div>
        <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=1143&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></img>
        <p>Mr. Meao</p>
        <p class="sub-text">8 mutual friends</p>
        <button>
            Add Friend
        </button>
    </div>
    
    <div>
        <img src="https://plus.unsplash.com/premium_photo-1703417464507-1766a5e905e2?q=80&w=1145&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></img>
        <p>Marshmallow</p>
        <p class="sub-text">5 mutual friends</p>
        <button>
            Add Friend
        </button>
    </div>
</body>
</html>
