<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Some More Buttons</title>
    <style>
       .Box {
         background-color: rgb(210, 210, 210);
         color: white;
         width: 190px;
         padding-top: 10px;
         padding-bottom: 10px;
         padding-left: 10px;
         padding-right: 10px;
         cursor: pointer;
         }
         
       .back {
         padding-top: 6px;
         padding-right: 6px;
         padding-bottom: 6px;
         padding-left: 6px;
         }
       .next {
         padding-top: 6px;
         padding-right: 6px;
         padding-bottom: 6px;
         padding-left: 6px;
         }
        a {
         margin-left: 5px;
         }
       .five {
         margin-right: 5px;
         }
    </style>
</head>
<body>
    <h1>Pagination</h1>
    <div class="Box">
        <button class="back">
            Back
        </button>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#" class="five">5</a>
        <button class="next">
            Next
        </button>
    </div>
</body>
</html>
