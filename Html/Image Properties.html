<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Practice</title>
    <style>
        
       .cat1 {
          width: 200px;
          border-radius: 10px;
          }
       .cat2 {
          width: 200px;
          height: 200px;
          object-fit: cover;
          object-position: right;
          }
         
       .cat3 {
         width: 100%;
         height: 100%;
         object-fit: cover;
         }
        div {
         height: 200px;
         width: 200px;
         border-width: 4px;
         border-style: solid;
         border-color: red;
         border-radius: 50%;
         overflow: hidden;
       <!-- By using overflow: hidden, in div u are telling div that "Hide anything that goes outside my borders." -->
         }
          
    </style>
</head>
<body>
    <img class="cat1" src="https://images.unsplash.com/photo-1478098711619-5ab0b478d6e6?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y2F0JTIwd2FsbHBhcGVyfGVufDB8fDB8fHww" alt="cat">
    
    <img class="cat2" src="https://images.pexels.com/photos/2061057/pexels-photo-2061057.jpeg?_gl=1*1ogd5fb*_ga*NjkyNTExNTQ2LjE3NzIyMTgzMDI.*_ga_8JE65Q40S6*czE3NzIyMTgzMDEkbzEkZzEkdDE3NzIyMTgzMDMkajU4JGwwJGgw" alt="cat">
    
    <div>
    <img class="cat3" src="https://images.hdqwalls.com/wallpapers/bthumb/cute-kitten-4k-im.jpg" alt="cat3">
    </div>
</body>
</html>
