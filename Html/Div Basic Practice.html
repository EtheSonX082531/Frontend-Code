<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Div Basic Practice</title>
    <style>
        div {
         margin-bottom: 10px;
         }
       .square {
        height: 100px;
        width: 100px;
        background-color: red;
        }
        
      .circle {
        height: 100px;
        width: 100px;
        border-radius: 50px;
        background-color: green;
        }
      .wrap {
       border-style: solid;
       border-color: black;
       border-width: 1px;
       padding-left: 20px;
       box-sizing: border-box;
       height: 100px;
       width: 300px;
       }
      .wrap2 {
        height: 120px;
        width: 370px;
        background-color: black;
        padding-top: 6px;
        padding-left: 20px;
        }
      .heading {
        color: white;
        font-weight: bold;
        font-size: 20px;
        }
      .suggestion {
        color: white;
        }
    </style>
</head>
<body>
    <div class="square">
        
    </div>
    <!--  -->
    <div class="circle">
        
    </div>
    <!--  -->
    <div class="wrap">
        <p>Satisfied with our service?</p>
        <button>
            Yes
        </button>
        <button>
            No
        </button>
    </div>
    <!--  -->
    <div class="wrap2">
        <p class="heading">
            Install Youtube Music
        </p>
        <p class="suggestion">
            Add YouTube Music in your Desktop for
            quick and easy access.
        </p>
    </div>
    
</body>
</html>
