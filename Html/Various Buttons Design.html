<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buttons</title>
    
    <style>
       button.subscribe-button {
          background-color: red;
          color: white;
          border: none;
          border-radius: 3px;
          height: 32px;
          width: 103px;
          cursor: pointer;
          margin-right: 10px;
        }    
        
        button.join-button {
          background-color: white;
          color: rgb(41,118,211);
          border-style: solid;
          border-width: 2px;
          border-radius: 3px;
          border-color: rgb(41,118,211);
          height: 32px;
          width: 103px;
          margin-right: 10px;
        }
          
        button.tweet-button {
          background-color: rgb(41,118,211);
          color: white;
          height: 32px;
          width: 103px;
          border: none;
          border-radius: 16px;
          font-weight: bold;
          font-size: 16px;
        }
        
        button.uber-button {
           background-color: black;
           height: 35px;
           width: 103px;
           color: white;
           border: none;
           margin-top:8px;
        }
        
       button.amazon-button {
        margin-top: 8px;
        margin-left: 8px;
        height: 30px;
        width: 150px;
        background-color: rgb(255,216,20);
        border: none;
        border-radius: 15px;
        font-size: 14px;
        }
       
       button.github-button {
         margin-right: 8px;
         margin-top: 8px;
         height: 35px;
         width: 103px;
         background-color: rgb(46,164,79);
         border: none;
         border-radius: 5px;
         font-weight: bold;
         font-size: 15px;
         color: white;
       }
       
       div.bootstrap {
          height: 50px;
          width: 235px;
          background-color: rgb(245,245,240);
          margin-top: 8px;
       }
       
       button.getstarted-button {
         margin-top: 8px;
         margin-left: 8px;
         height: 32px;
         width: 103px;
         background-color: rgb(121,82,179);
         border: none;
         border-radius: 3px;
         font-weight: bold;
         color: white;
       }
      
       button.download-button {
         height: 32px;
         width: 103px;
         margin-top: 8px;
         margin-left: 8px;
         border-style: solid;
         border-width: 1px;
         border-radius: 3px;
         font-weight: bold;
         color: rgb(108,117,175);
       }
       
       button.learn-button {
   							 height: 32px;
   							 width: 135px;
    							border: 2px solid rgb(255,0,0);
   							 border-radius: 16px;
   							 margin-top: 8px;
    							color: white;
   							 background-color: rgb(255,182,193);
    							cursor: pointer;
    							display: flex;
    							align-items: center;
    							justify-content: center;
    							gap: 8px;
       }

    			span.learn-span {
     				 display: inline-flex;
     				 height: 20px;
     				 width: 20px;
     				 border-radius: 50%;
     				 background-color: white;
      				color: red;
      				font-weight: bold;
     				 font-size: 12px;
       			align-items: center;
    				  justify-content: center;
       }
       
    </style>
    
</head>
<body>
    
    <button class="subscribe-button">
        SUBSCRIBE
    </button>
    
    <button class="join-button">
        JOIN
    </button>
    
    <button class="tweet-button">
        Tweet
    </button>
    
    <button class="uber-button">
        Request now
    </button>
    
    <button class="amazon-button">
        Add to Cart
    </button>
    
    <button class="github-button">
        Sign up
    </button>
    
    <div class="bootstrap">
        <button class="getstarted-button">
            Get started
        </button>
        
        <button class="download-button">
            Download
        </button>
    </div>
    
    <button class="learn-button">
        LEARN MORE
        <span class="learn-span">
            >
        </span>
    </button>
    
</body>
</html>
