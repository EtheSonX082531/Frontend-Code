<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Flexbox</title>
    <style>
       .header{
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          background-color: rgb(114, 87, 165);
          color: white;
          align-items: center;
          height: 80px;
          }
        .home {
          font-weight: bold;
          font-size: 25px;
          margin-left: 25px;
          box-shadow: 0px 0px 5px black;
          width: 120px;
          margin-right: 20px;
           border: 1px solid white;
           padding-top: 15px;
           padding-bottom: 15px;
           padding-left: 40px;
          }
         input {
           height: 45px;
           flex: 1;
           margin-right: 100px;
           margin-left: 120px;
           border-radius: 30px;
           border-style: none;
           box-shadow: 0px 0px 5px black;
           font-size: 20px;
           padding-left: 40px;
           }
        .download {
           margin-right: 20px;
           border: 1px solid white;
           padding-top: 15px;
           padding-bottom: 15px;
           padding-left: 26px;
           font-size: 22px;
           width: 120px;
           border-radius: 3px;
           box-shadow: 0px 0px 5px black;
           }
    </style>
   
</head>
<body>
    <div class="header">
        <p class="home">Home</p>
        <input type="text" placeholder="search">
        <p class="download">Download</p>
    </div>
</body>
</html>
