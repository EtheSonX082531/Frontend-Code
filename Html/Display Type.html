<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Type</title>
    <style>
       .name-input, .email-input {
         display: block;
         margin-top: 5px;
         }
       .customer-message {
         display: inline-block;
         width: 240px;
         }
       .yes-button, .no-button {
         background-color: aqua;
         color: white;
         }
       .google-img {
         display: block;
         height: 120px;
         margin-top: 20px;
         margin-left: 80px;
         margin-bottom: 0px;
         }
       .search-box {
         display: block;
         height: 35px;
         width: 360px;
         margin-left: 5px;
         border-style: none;
         border-radius: 20px;
         box-shadow: 0px 0px 6px rgba(0,0,0,0.2);
         }
    </style>
</head>
<body>
    <input type="text" placeholder="Name" class="name-input">
    <input type="email" placeholder="Email" class="email-input">
    <p class="customer-message">Thanks for chatting with our customer
    support. Would you like to take our
    quick survey?</p>
    <button class="yes-button">
        Yes
    </button>
    <button class="no-button">
        No
    </button>
    
    <img src="https://static.wikia.nocookie.net/chile/images/5/51/Google.png/revision/latest?cb=20250510183518&path-prefix=es" alt="google" class="google-img"></img>
    <input type="text" placeholder="Search Google or type a URL" class="search-box">
</body>
</html>
