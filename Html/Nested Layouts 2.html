<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nested Layouts 2</title>
    <style>
       .container {
         height: 100px;
         margin-bottom: 10px;
         }
       img {
         height: 100%;
         width: 100%;
         object-fit: cover;
         }
       .image-container {
         display: inline-block;
         padding-top: 5px;
         padding-left: 5px;
         width: 150px;
         overflow: hidden;
         vertical-align: top;
         }
       .text-container {
         display: inline-block;
         margin-left: 5px;
         margin-top: 0px;
         height: 100px;
         }
        p {
         margin-top: 0px;
         margin-bottom: 0px;
         }
       .main-title {
         width: 200px;
         font-weight: bold;
         margin-top: 10px;
         margin-bottom: 10px;
         }
       .sub-text {
         font-size: 12px;
         }
       .info {
         font-size: 12px;
         }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="https://static-cse.canva.com/blob/1808021/create_youtube-thumbnails_lead4x.a79d6e88.avif" alt=""></img>
        </div>
        <div class="text-container">
            <p class="main-title">How to become a
            frontend developer by learning html.</p>
            <p class="sub-text">Learn with AR</p>
            <p class="info">1.5K views 4 months ago</p>
        </div>
    </div>
    
    <div class="container">
        <div class="image-container">
            <img src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/youtube-thumbnail-template-design-5fa9cd79a6367f8446a5208e4540a493_screen.jpg?ts=1699135222" alt=""></img>
        </div>
        <div class="text-container">
            <p class="main-title">এই ভিডিওতে ক্লিক করে এমন হা করা শিখতে পারবেন</p>
            <p class="sub-text">Jail thaki vaga bandor</p>
            <p class="info">2.69K views 7 months ago</p>
        </div>
    </div>
    
    <div class="container">
        <div class="image-container">
            <img src="https://i.pinimg.com/736x/95/0e/1d/950e1dc33f47d98aa52593dde262bd8c.jpg" alt=""></img>
        </div>
        <div class="text-container">
            <p class="main-title">ওনো ক্লিক করিয়া ভুংভাং মাত হিকিলাও মাত্র আধা ঘন্টায়</p>
            <p class="sub-text">Kita-kiti-Mat</p>
            <p class="info">71K views 12 months ago</p>
        </div>
    </div>
    
</body>
</html>
