<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout 1</title>
    <style>
        body {
         display: flex;
         justify-content: center;
         align-items: center;
         }
       .container {
          height: 800px;
          width: 800px;
          background-color: aqua;
          display: grid;
          grid-template-rows: 1fr 2fr 2fr 1fr;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 10px;
          font-size: 40px;
          color: white;
          text-align: center;
          }
        .header {
          background-color: blue;
          grid-column-start: 1;
          grid-column-end: 4;
          }
        .sidebar {
          background-color: yellow;
          grid-row-start: 2;
          grid-row-end: 4;
          }
        .content1 {
          background-color: green;
          grid-column-start: 2;
          grid-column-end: 4;
          }
        .content2 {
          background-color: red;
          }
        .content3 {
          background-color: brown;
          }
        .footer {
          background-color: pink;
          grid-column-start: 1;
          grid-column-end: 4;
          }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content1">Content 1</div>
        <div class="content2">Content 2</div>
        <div class="content3">Content 3</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
