<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Effects</title>
    
    <style>
        
        button.subscribe-button {
          background-color: red;
          color: white;
          border: none;
          border-radius: 3px;
          height: 32px;
          width: 103px;
          cursor: pointer;
          margin-right: 10px;
          transition: opacity 1s;
        }    
        
        button.subscribe-button:hover {
           opacity: 0.7;
        }
        
        button.subscribe-button:active {
           opacity: 0.3;
        }
        
        button.join-button {
          background-color: white;
          color: rgb(41,118,211);
          border-style: solid;
          border-width: 2px;
          border-radius: 3px;
          border-color: rgb(41,118,211);
          height: 32px;
          width: 103px;
          margin-right: 10px;
          cursor: pointer;
          transition: background-color 1s,color 1s;
        }
        
        button.join-button:hover {
           background-color: rgb(41,118,211);
           color: white;
         }
          
        button.tweet-button {
          background-color: rgb(41,118,211);
          color: white;
          height: 32px;
          width: 103px;
          border: none;
          border-radius: 16px;
          font-weight: bold;
          font-size: 16px;
          cursor: pointer;
          transition: font-size 1s;
          box-shadow: 2px 2px 7px rgba(0,0,0,0.7);
        }
        
        button.tweet-button:hover {
          font-size: 20px;
        }
        
    </style>
    
</head>
<body>
    
    <button class="subscribe-button">
        SUBSCRIBE
    </button>
    
    <button class="join-button">
        JOIN
    </button>
    
    <button class="tweet-button">
        Tweet
    </button>
    
</body>
</html>
