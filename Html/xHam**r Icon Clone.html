<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pagination Practice</title>
    <style>
       .main {
         width: 385px;
         background-color: rgb(40,40,40);
         padding-top: 10px;
         padding-left: 10px;
         padding-right: 10px;
         padding-bottom: 10px;
         }
       .nextpage {
         width: 385px;
         height: 40px;
         font-weight: bold;
         color: white;
         background-color: rgb(227, 65, 70);
         border-style: none;
         border-radius: 4px;
         margin-bottom: 5px;
         }
       .one {
         margin-left: 20px;
         }
       .last {
         margin-right: 20px;
         }
        button {
         padding-top: 10px;
         padding-left: 10px;
         padding-right: 10px;
         padding-bottom: 10px;
         background-color: rgb(90, 90, 90);
         color: white;
         border-style: none;
         border-radius: 5px;
         }
        span {
         color: white;
         }
        img {
          height: 50px;
          }
    </style>
</head>
<body>
    <img src="https://images.seeklogo.com/logo-png/42/1/xhamster-logo-png_seeklogo-424591.png" alt="rabbit">
    <h1>xHamster</h1>
    <div class="main">
        <button class="nextpage">
            Next Page >
        </button>
        <br> 
        <button class="one">1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <span>...</span>
        <button>11448</button>
        <span>...</span>
        <button class="last">22894</button>
        <hr>
    </div>
</body>
</html>
