<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <title>Basics Practice</title>
      <style>
         li {
         margin-top: 8px;
         color: black;
         }
         button {
         margin-left: 10px;
         cursor: pointer;
         }
         .subscribe-button {
         background-color: red;
         height: 32px;
         width: 100px;
         color: white;
         border-style: none;
         }
         .uber-button {
         background-color: black;
         color: white;
         width: 100px;
         height: 32px;
         border-style: none;
         }
         .amazon-button {
         background-color: rgb(255,216,20);
         color: black;
         border-style: none;
         width: 160px;
         height: 32px;
         border-radius: 16px;
         }
         .sign-up-button {
         background-color: rgb(46,164,79);
         height: 30px;
         width: 80px;
         color: white;
         font-weight: bold;
         border-style: none;
         border-radius: 5px;
         font-size: 12px;
         }
         .get-started-button {
         height: 35px;
         width: 80px;
         background-color: rgb(121,82,179);
         font-size: 10px;
         font-weight: bold;
         border-style: none;
         border-radius: 5px;
         color: white;
         }
         .download-button {
         height: 35px;
         width: 80px;
         font-weight: bold;
         font-size: 10px;
         border: 1px solid rgb(108,117,125);
         border-radius: 5px;
         background-color: white;
         color: rgb(108,117,125);
         }
         p{
         display: inline-block;
         height: 35px;
         width: 35px;
         border-radius: 50%;
         background-color: pink;
         color: white;
         margin-left:13px;
         text-align: center;
         line-height: 35px; /* centers text vertically */
         margin-top: 0;
         margin-bottom: 0;
         }
         .learn-button {
         display: flex;
         flex-direction: row;
         align-items: center;
         justify-content: center;
         padding-right: 0px;
         padding-left: 8px;
         height: 35px;
         width: 141px;
         background-color: white;
         border: 2px solid pink;
         border-radius: 17.5px;
         box-sizing: border-box;
         }
      </style>
   </head>
   <body>
      <ol>
         <li>Subscribe Button:
            <button class="subscribe-button">SUBSCRIBE</button>
         </li>
         <li>Uber Request Button:
            <button class="uber-button">
            Request now
            </button>
         </li>
         <li>Amazon Button:
            <button class="amazon-button">
            Add to Cart
            </button>    
         </li>
         <li>GitHub Sign Up Button:
            <button class="sign-up-button">
            Sign up
            </button>
         </li>
         <li>Bootstrap Buttons:
            <button class="get-started-button">
            Get started
            </button>
            <button class="download-button">
            Download
            </button>
         </li>
         <li>
            Learn More Button:
            <button class="learn-button">
               LEARN MORE
               <p>></p>
            </button>
         </li>
      </ol>
   </body>
</html>
