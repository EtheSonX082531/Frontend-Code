<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page title</title>
    <style>
        hr{
          border:1px solid aqua;
          }
       .stretch {
         padding-left: 8px;
         padding-right: 8px;
         padding-top: 5px;
         padding-bottom: 5px;
         background-color: green;
         color: white;
         border-style: none;
         font-weight: bold;
         
         transition: padding-left 0.15s,
          											padding-right 0.15s,
          											padding-top 0.15s,
          											padding-bottom 0.15s;
         }
       .stretch:hover {
         padding-left: 12px;
         padding-right: 12px;
         padding-top: 9px;
         padding-bottom: 9px;
         }
        
       .box1 {
         height: 40px;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         border: 1px solid red;
         box-shadow: 2px 2px 2px rgba(0,0,0,0.2);
         }
        
       .sub-box{
          display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          }
          
       .nav {
         padding-left: 8px;
         padding-right: 8px;
         padding-top: 5px;
         padding-bottom: 5px;
         margin-right: 20px;
         border-style: none;
         background-color: red;
         font-weight: bold;
         color: white;
         box-shadow: 2px 2px 2px rgba(0,0,0,0.2);
         transition: padding-right 0.15s,
                     padding-right 0.15s,
                     padding-right 0.15s,
                     padding-right 0.15s,
                     border 0.15s,
                     box-shadow 0.15s;
         }
        
       .nav:hover {
          padding-right: 15px;
          padding-left: 15px;
          padding-top: 8px;
          padding-bottom: 8px;
          border: 1px solid white;
          box-shadow: 2px 2px 2px rgba(0,0,0,0.2);
          }
        
       
    </style>
</head>
<body>
    <button class="stretch">
        STRETCH
    </button>
    
    <hr>
    
    <div class="box1">
       <div class="sub-box">
        <button class="nav home">
            Home
        </button>
        
        <button class="nav about">
            About Us
        </button>
        
        <button class="nav contact">
            Contact Us
        </button>
        
        <button class="nav exit">
            Exit
        </button>
       </div>
    </div>
    
    
</body>
</html>
