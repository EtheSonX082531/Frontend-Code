<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Formatting</title>
    
    <style>
       .vidio-title {
          font-family: Arial;
          font-size: 18px;
          font-weight: bold;
          width: 275px;
          line-height: 24px;
          margin-bottom: 0px;
          }
       .vidio-stats {
          font-family: Arial;
          font-size: 14px;
          color: rgb(96,96,96);
          margin-top: 5px;
          }
       .name {
          font-family: Arial;
          font-size: 14px;
          color: rgb(96,96,96);
          margin-top: 35px;
          }
        .content {
          font-family: Arial;
          font-size: 14px;
          color: rgb(96,96,96);
          width: 275px;
          margin-top: 22px;
          line-height: 24px;
          }
          
        .box {
          font-family: Arial;
          color: white;
          text-align: center;
          font-size: 10px;
          background-color: rgb(227,65,66);
          padding-top: 10px;
          padding-bottom: 10px;
          margin-top: 50px;
          }
        .shopnow {
          color: white;
          cursor: pointer;
          transition: text-decoration 1s;
          }
        .shopnow:hover {
          text-decoration: underline;
          }
    </style>
    
</head>
<body>
    <p class="vidio-title">Talking Tech and Ai with Google CEO Sundar Pichai!</p>
    
    <p class="vidio-stats">3.4M views &#183; 6 months ago</p>
    
    <p class="name">Marques Brownle &#10003</p>
    
    <p class="content">
        Sundar Pichai explained how responsible AI development is important for the future.
    </p>
    
    <div class="box">
        Shop early for the best selection of holiday favourites.<span class="shopnow"> Shop Now ></span>
    </div>
    
</body>
</html>
