<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flags</title>
    <style>
       .japan {
          height: 300px;
          width: 450px;
          border: 1px solid black;
          position: relative;
          margin-top: 30px;
          margin-bottom: 30px;
          }
       .circle {
          height: 150px;
          width: 150px;
          background-color: rgb(188, 0, 45);
          border-radius: 50%;
          position: absolute;
          left: 150px;
          top: 75px;
          }
       .random-flag {
          height: 300px;
          width: 450px;
          background-color: yellow;
          margin-top: 100px;
          border: 1px solid black;
          position: relative;
          margin-top: 30px;
          margin-bottom: 30px;
          }
       .sqr1 {
          height: 120px;
          width: 120px;
          background-color: rgb(0, 0, 128);
          position: absolute;
          }
       .rectan1 {
         height: 120px;
         width: 280px;
         background-color: rgb(0, 0, 128);
         position: absolute;
         left: 170px;
         }
       .sqr2 {
          height: 120px;
          width: 120px;
          background-color: rgb(0, 0, 128);
          position: absolute;
          top: 180px;
          }
       .rectan2 {
         height:120px;
         width: 280px;
         background-color: rgb(0, 0, 128);
         position: absolute;
         left: 170px;
         top: 180px;
         }
       li {
        margin-bottom: 0px;
        font-size: 40px;
        }
      .argentina {
        height: 300px;
        width: 450px;
        border: 1px solid black;
        margin-top: 30px;
        margin-bottom: 30px;
        }
      .argen {
        height: 100px;
        width: 450px;
        }
      .one {
        background-color: skyblue;
        }
      .two {
        background-color: white;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        }
      .three {
        background-color: skyblue;
        }
       img {
         height: 100%;
         width: 100%;
         object-fit: cover;
         }
      .sun {
        height: 100px;
        width: 100px;
        }
    </style>
</head>
<body>
  <ol>
   <li> Japan Flag
    <div class="japan">
        <div class="circle">
            
        </div>
    </div>
   </li>
   
   <li> Random Flag
