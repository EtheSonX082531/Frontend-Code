<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card</title>
    <style>
        body {
          background-color: black;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
        }

        .card {
          height: 1000px;
          overflow: hidden;
          
          box-shadow: 
            0 0 10px rgb(187, 0, 255),
            0 0 20px rgb(187, 0, 255),
            0 0 40px rgb(187, 0, 255),
            0 0 80px rgb(187, 0, 255);
        }

        .card img {
          height: 100%;
          width: 100%;
          object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://rare-gallery.com/thumbnail/1394418-Jill-Valentine-Nemesis-Resident-Evil-3-Video-Game.jpg">
    </div>
</body>
</html>
