<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basic Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Dancing Script', cursive;

            background-image: url("image.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
        }

        .container {
            padding-top: 50px;
            display: grid;
            grid-template-rows: 100px 60px 60px 60px 60px;
            justify-items: center;
            border-style: solid;
            border-color: white;
            border-width: 1px;
            border-radius: 10px;
            height: 500px;
            row-gap: 15px;
            box-shadow: 0px 0px 20px rgb(148, 0, 211),
                0px 0px 40px rgb(148, 0, 211),
                0px 0px 60px rgb(148, 0, 211);
                backdrop-filter: blur(3px);
        }

        h1 {
            color: white;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            margin-bottom: 30px;
            font-size: 50px;
        }

        input {
            width: 320px;
            height: 40px;
            margin: 20px;
            text-align: center;
            border-style: solid;
            border-color: white;
            border-width: 1px;
            background-color: black;
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0px 0px 20px rgb(148, 0, 211);
            
        }

        input::placeholder {
            color: white;
        }

        img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .dp-image {
            height: 120px;
            width: 120px;
            border: 1px solid white;
            border-radius: 90px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgb(148, 0, 211);
        }

        .click-me {
            margin-top: 20px;
            height: 50px;
            width: 120px;
            border-color: white;
            border-style: solid;
            border-width: 1px;
            background-color: black;
            box-shadow: 0px 0px 20px rgb(148, 0, 211);
            color: white;
            font-size: 25px;
            font-weight: bold;
            font-family: 'Dancing Script', cursive;
        }
    </style>
</head>

<body>
    <h1>Blue Beetle Registration Form</h1>
    <div class="container">
        <div class="dp-image">
            <img src="blue-beetle-dc-3840x2160-11629.jpg" alt=""></img>
        </div>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <input type="tel" placeholder="Phone Number">
        <button class="click-me">
            Register 
        </button>
    </div>
</body>

</html>
